<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tidak ada title yang kelihatan, karena ini full website -->
</head>
<body style="margin:0; padding:0; overflow-x:hidden;">
    <div id="loading" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#f0f0f0; display:flex; align-items:center; justify-content:center; font-family:Arial; color:#555; z-index:9999;">
        Memuat website...
    </div>

    <iframe id="websiteFrame" style="width:100vw; height:100vh; border:none; position:fixed; top:0; left:0;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>

    <script>
        const savedCode = localStorage.getItem('myCustomWebsite');

        const frame = document.getElementById('websiteFrame');
        const loading = document.getElementById('loading');

        if (savedCode && savedCode.trim() !== '') {
            // Render kode sebagai dokumen lengkap
            frame.srcdoc = savedCode;

            // Hilangkan loading setelah iframe selesai render (kurang lebih)
            frame.onload = function() {
                setTimeout(() => {
                    loading.style.display = 'none';
                }, 300);
            };
        } else {
            // Jika belum ada kode sama sekali
            frame.srcdoc = `
                <!DOCTYPE html>
                <html>
                <head><title>Belum Ada Website</title></head>
                <body style="margin:0; height:100vh; display:flex; align-items:center; justify-content:center; font-family:Arial; background:#f8f9fa; color:#666;">
                    <div style="text-align:center;">
                        <h2>Belum ada kode website</h2>
                        <p>Kembali ke Website 1, masukkan kode HTML, lalu simpan.</p>
                    </div>
                </body>
                </html>
            `;
            loading.style.display = 'none';
        }
    </script>
</body>
</html>
